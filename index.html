<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS Law</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Tahoma, Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
            color:#222;
        }

        header{
            background:#0d1b2a;
            color:#fff;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:#fff;
            text-decoration:none;
            margin-right:20px;
        }

        .hero{
            text-align:center;
            padding:100px 20px;
            background:white;
        }

        .hero h1{
            font-size:48px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:20px;
            color:#666;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            background:#c8a45d;
            color:white;
            text-decoration:none;
            padding:15px 30px;
            border-radius:6px;
        }

        .services{
            padding:60px 20px;
            text-align:center;
        }

        .cards{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
            margin-top:30px;
        }

        .card{
            background:white;
            width:300px;
            padding:25px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        footer{
            background:#0d1b2a;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:50px;
        }
    </style>
</head>

<body>

<header>
    <h2>BS Law</h2>

    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">من نحن</a>
        <a href="#">الخدمات</a>
        <a href="#">تواصل معنا</a>
    </nav>
</header>

<section class="hero">
    <h1>BS Law</h1>
    <p>مكتب محاماة واستشارات قانونية</p>

    <a class="btn" href="#">احجز استشارة</a>
</section>

<section class="services">

<h2>خدماتنا</h2>

<div class="cards">

<div class="card">
<h3>الاستشارات القانونية</h3>
<p>تقديم الاستشارات القانونية للأفراد والشركات.</p>
</div>

<div class="card">
<h3>التقاضي</h3>
<p>تمثيل العملاء أمام جميع المحاكم.</p>
</div>

<div class="card">
<h3>العقود</h3>
<p>إعداد ومراجعة وصياغة العقود القانونية.</p>
</div>

</div>

</section>

<footer>
© 2026 BS Law - جميع الحقوق محفوظة
</footer>

</body>
</html>
